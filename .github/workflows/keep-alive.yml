name: Keep-alive ping

on:
  schedule:
    - cron: '0 2 * * *'   # 06:00 Dubai — runs 1h before news update
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Touch keep-alive file
        run: |
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/keep-alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keep-alive.txt
          git commit -m "chore: keep-alive $(date -u +'%Y-%m-%d')"
          git push
