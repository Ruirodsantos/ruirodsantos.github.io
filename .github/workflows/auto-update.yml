name: Auto-update blog posts

on:
  schedule:
    - cron: '0 3 * * *'   # 07:00 Dubai (UTC+4) — primary
    - cron: '0 4 * * *'   # 08:00 Dubai (UTC+4) — fallback if primary skipped
  workflow_dispatch: {}    # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-slugify anthropic

      - name: Ensure folders
        run: |
          mkdir -p _posts
          mkdir -p assets/cache
          [ -f assets/cache/.gitkeep ] || : > assets/cache/.gitkeep

      - name: Run updater
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python scripts/update_posts.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/
          if git diff --cached --quiet; then
            echo "No new posts today"
          else
            git commit -m "chore: daily news update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
