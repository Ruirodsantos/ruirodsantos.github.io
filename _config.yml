title: "The AI Pulse Hub"
description: "Daily AI news explained simply. No jargon, no hype - just what it means for your money, your work, and your future."
url: "https://theaipulsehub.com"
baseurl: ""
author:
  name: "The AI Pulse Hub"
  email: hello@theaipulsehub.com

# SEO
lang: en-US
timezone: UTC
permalink: /:categories/:year/:month/:day/:title/

# Social
twitter:
  username: theaipulsehub
  card: summary_large_image

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Feed
feed:
  path: feed.xml

# Build
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - assets/cache
